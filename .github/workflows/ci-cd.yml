name: CI/CD Pipeline

# Тригери для запуску пайплайну
on:
  # Запуск при push у гілки main та develop
  push:
    branches:
    - main
    - develop

  # Запуск при створенні Pull Request
  pull_request:
    branches:
    - main
    - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint